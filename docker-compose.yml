services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ai-photo-backend:local
    container_name: ai-photo-backend
    restart: unless-stopped
    ports:
      - "${PORT:-4173}:4173"
    environment:
      NODE_ENV: production
      PORT: 4173
      KL_API_BASE_URL: ${KL_API_BASE_URL:-https://api.kl-api.info}
      KL_API_TOKEN: ${KL_API_TOKEN:-}
      KL_API_KEY: ${KL_API_KEY:-}
      KL_IMAGE_MODEL: ${KL_IMAGE_MODEL:-gpt-image-2}
      KL_PROXY_URL: ${KL_PROXY_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/packages').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
