services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ai-photo-backend:local
    container_name: ai-photo-backend
    restart: unless-stopped
    ports:
      - "${PORT:-4173}:4173"
    environment:
      NODE_ENV: production
      PORT: 4173
      KL_API_BASE_URL: ${KL_API_BASE_URL:-https://api.kl-api.info}
      KL_API_TOKEN: ${KL_API_TOKEN:-}
      KL_API_KEY: ${KL_API_KEY:-}
      KL_IMAGE_MODEL: ${KL_IMAGE_MODEL:-gpt-image-2}
      KL_PROXY_URL: ${KL_PROXY_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/packages').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
  backend-fastapi:
    build:
      context: .
      dockerfile: backend_fastapi/Dockerfile
    image: ai-photo-fastapi:local
    container_name: ai-photo-fastapi
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      PORT: 8000
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/backend_fastapi.db}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8000}
      KL_API_BASE_URL: ${KL_API_BASE_URL:-https://api.kl-api.info}
      KL_API_TOKEN: ${KL_API_TOKEN:-}
      KL_IMAGE_MODEL: ${KL_IMAGE_MODEL:-gpt-image-2}
      KL_IMAGE_ENDPOINT: ${KL_IMAGE_ENDPOINT:-/v1/images/edits}
      KL_TIMEOUT_SECONDS: ${KL_TIMEOUT_SECONDS:-600}
      KL_PROXY_URL: ${KL_PROXY_URL:-}
      AI_MOCK_GENERATION: ${AI_MOCK_GENERATION:-0}
      AI_UNLIMITED_CREDITS: ${AI_UNLIMITED_CREDITS:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}
      COS_PREFIX: ${COS_PREFIX:-ai-image}
      COS_PUBLIC_BASE_URL: ${COS_PUBLIC_BASE_URL:-}
    volumes:
      - fastapi-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  fastapi-data:
